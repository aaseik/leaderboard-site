<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Fotballauksjon</title>

<style>
  body {
    margin: 0;
    padding: 10px;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0b3c78;
    color: #fff;
  }

  .top {
    text-align: center;
    margin-bottom: 10px;
  }

  .top a {
    display: inline-block;
    padding: 8px 14px;
    background: #1e90ff;
    color: #fff;
    font-weight: bold;
    text-decoration: none;
    border-radius: 6px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #ffffff;
    color: #000;
    font-size: 30px;
  }

  
tbody tr:nth-child(even) {
  background-color: #f3f7ff;
}

  
th, td {
  border: 1.5px solid #666;   /* mørkere og litt tykkere */
  padding: 6px;
}

  /*
  th, td {
    border: 1px solid #ccc;
    padding: 6px;
    text-align: left;
  }
  */

/*  th {
    background: #e6f0ff;
    font-weight: 600;
  }
*/
  
th {
  background: #cfe0ff;
  border-bottom: 2px solid #444;
}


  td.group {
    background: #d9e8ff;
    font-weight: bold;
    text-align: center;
    width: 36px;
  }

  td.bid, td.owner {
    text-align: center;
    /*font-weight: bold;*/
  }
</style>
</head>

<body>

<div class="top">
  <a style="font-size: 30px;" href="https://forms.microsoft.com/Pages/ResponsePage.aspx?id=RByXkBQjgkOXmxrLrMPMmL8tWnsAJVFBiTBsVlaAMDNUMEVLOFFDWDFQU0RMVk9EMTNRM1VJUUVZWS4u"
     target="_blank">
    ➕ Legg inn bud
  </a>
</div>

<table id="leaderboard">
  <thead>
    <tr>
      <th>Gr</th>
      <th>Lag</th>
      <th>Bud [NOK]</th>
      <th>Eier</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
async function loadData() {
  const res = await fetch("https://leaderboarddata123.blob.core.windows.net/public-data/leaderboard.json?ts=" + Date.now());
  const data = await res.json();

  const tbody = document.querySelector("#leaderboard tbody");
  tbody.innerHTML = "";

  const groups = {};
  data.forEach(team => {
    if (!groups[team.group]) groups[team.group] = [];
    groups[team.group].push(team);
  });

  Object.keys(groups).sort().forEach(groupName => {
    const teams = groups[groupName].sort((a, b) => b.bid - a.bid);

    teams.forEach((team, index) => {
      const tr = document.createElement("tr");

      if (index === 0) {
        const tdGroup = document.createElement("td");
        tdGroup.className = "group";
        tdGroup.rowSpan = teams.length;
        tdGroup.innerText = groupName;
        tr.appendChild(tdGroup);
      }

      tr.innerHTML += `
        <td class="team">${team.team}</td>
        <td class="bid">${team.bid}</td>
        <td class="owner">${team.owner}</td>
      `;

      tbody.appendChild(tr);
    });
  });
}

loadData();
setInterval(loadData, 10000);
</script>

</body>
</html>
